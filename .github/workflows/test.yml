name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: sudo apt-get install cmake build-essential
      - name: Build
        run: |
          mkdir build
          cd build
          cmake ..
          cmake --build . --target chess_test
      - name: Run tests
        run: ./build/chess_test